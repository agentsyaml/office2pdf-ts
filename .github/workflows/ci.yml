name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript, tests, and formatting
        run: npm run check

      - name: Check Rust formatting
        run: cargo fmt --manifest-path rust/Cargo.toml --check

      - name: Check Rust lints
        run: cargo clippy --manifest-path rust/Cargo.toml --target wasm32-unknown-unknown --all-targets -- -D warnings

      - name: Build package
        run: npm run build

      - name: Smoke test installed package
        run: npm run smoke:installed

      - name: Verify npm package contents
        run: npm pack --dry-run
